<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MMSU Medical · Page Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #0a0f0d;
      --surface:    #111a15;
      --surface2:   #162019;
      --border:     rgba(255,255,255,0.06);
      --border2:    rgba(255,255,255,0.10);
      --green:      #1a7a3c;
      --green-dim:  #0f4a24;
      --accent:     #e8c84a;
      --accent2:    #f5dfa0;
      --accent-dim: rgba(232,200,74,0.10);
      --text:       #f0ede8;
      --text-2:     rgba(240,237,232,0.55);
      --text-3:     rgba(240,237,232,0.28);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Figtree', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(26,122,60,0.12) 0%, transparent 65%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -150px; right: -150px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(232,200,74,0.07) 0%, transparent 65%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 24px;
      padding: 56px 64px;
      max-width: 520px;
      width: calc(100% - 32px);
      text-align: center;
      box-shadow: 0 40px 100px rgba(0,0,0,0.5);
    }

    /* Pulse ring around the code */
    .code-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }
    .code-wrap::before {
      content: '';
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(26,122,60,0.18) 0%, transparent 70%);
    }
    .code-wrap::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(26,122,60,0.25);
    }

    .code {
      font-family: 'Instrument Serif', serif;
      font-size: 96px;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -4px;
    }

    .icon {
      display: block;
      margin: 0 auto 20px;
      width: 48px; height: 48px;
      background: var(--accent-dim);
      border: 1px solid rgba(232,200,74,0.2);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg { width: 24px; height: 24px; stroke: var(--accent); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    p {
      font-size: 15px;
      color: var(--text-2);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 24px;
      border-radius: 10px;
      font-family: 'Figtree', sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.18s ease;
    }
    .btn-primary {
      background: var(--green);
      color: #fff;
    }
    .btn-primary:hover { background: #1f9048; transform: translateY(-1px); }

    .btn-ghost {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border2);
    }
    .btn-ghost:hover { border-color: var(--border2); background: var(--surface2); color: var(--text); }

    .logo {
      margin-bottom: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .logo-dot {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--green) 0%, #0f4a24 100%);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-dot svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .logo-text { font-size: 13px; font-weight: 600; color: var(--text-3); letter-spacing: 0.5px; text-transform: uppercase; }

    @media (max-width: 480px) {
      .card { padding: 40px 24px; }
      .code { font-size: 72px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-dot">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <span class="logo-text">MMSU Medical</span>
    </div>

    <div class="code-wrap">
      <span class="code">404</span>
    </div>

    <div class="icon">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35M11 8v3M11 14h.01"/></svg>
    </div>

    <h1>Page not found</h1>
    <p>The record you're looking for doesn't exist or may have been moved. Double-check the URL or head back to the dashboard.</p>

    <div class="actions">
      <a href="/" class="btn btn-primary">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Go to Dashboard
      </a>
      <a href="javascript:history.back()" class="btn btn-ghost">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Go Back
      </a>
    </div>
  </div>
</body>
</html>
